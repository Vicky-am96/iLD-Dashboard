  <script>
    // Inside the <script> tags of Pillar_ECD.html (and other individual files)
  function callBackendCanvas(pillarName) {
    console.log('call the backend canvas');
    
    google.script.run
      .withSuccessHandler(function(returnedPillarName) {
        console.log("Server finished working for: " + returnedPillarName);
        
        // Keep your 'document' interface manipulations here where they belong!
        document.getElementById('homepage-view').classList.add('hidden');
        if (typeof openPillar === "function") {
          openPillar(returnedPillarName);
        }
      })
      .withFailureHandler(function(error) {
        console.error("Connection failed: ", error.message);
      })
      .loadPillarCanvas(pillarName);
  }
    </script>
